<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Body: blue (head/right) → teal → green (tail/left) -->
    <linearGradient id="bGrad" x1="1" y1="0.2" x2="0.1" y2="1">
      <stop offset="0%"   stop-color="#0E7CC5"/>
      <stop offset="48%"  stop-color="#27AAB5"/>
      <stop offset="100%" stop-color="#58C67A"/>
    </linearGradient>
    <!-- Wings: teal (root) → bright green (tips) -->
    <linearGradient id="wGrad" x1="1" y1="1" x2="0" y2="0">
      <stop offset="0%"   stop-color="#2BAAB8"/>
      <stop offset="100%" stop-color="#58C67A"/>
    </linearGradient>
    <!-- Ring: blue (top-right) → green (bottom-left) -->
    <linearGradient id="rGrad" x1="0.85" y1="0.1" x2="0.15" y2="0.9">
      <stop offset="0%"   stop-color="#0E7CC5"/>
      <stop offset="100%" stop-color="#58C67A"/>
    </linearGradient>
  </defs>

  <!-- Circle ring (behind bird) -->
  <circle cx="49" cy="57" r="38" fill="none" stroke="url(#rGrad)" stroke-width="2.5"/>

  <!-- Wing feathers — 6 narrow leaf shapes fanning upper-left from shoulder -->
  <!-- Each: M root-left Q ctrl tip Q ctrl root-right Z -->
  <path fill="url(#wGrad)" d="M 48,35 Q 31,20 14, 8 Q 33,22 51,32 Z"/>
  <path fill="url(#wGrad)" d="M 48,36 Q 28,24 10,15 Q 30,27 50,38 Z"/>
  <path fill="url(#wGrad)" d="M 47,37 Q 26,29  9,22 Q 28,32 48,39 Z"/>
  <path fill="url(#wGrad)" d="M 46,38 Q 25,35 10,31 Q 27,37 47,40 Z"/>
  <path fill="url(#wGrad)" d="M 45,39 Q 26,42 12,41 Q 27,42 46,41 Z"/>
  <path fill="url(#wGrad)" d="M 44,41 Q 27,49 15,52 Q 28,48 45,43 Z"/>

  <!-- Bird body: beak→ right, forked tail → lower-left -->
  <path fill="url(#bGrad)" d="
    M 81,36
    C 79,27 73,19 66,20
    C 60,21 54,26 48,32
    C 42,38 33,47 24,60
    L 17,74
    L 23,69
    L 31,83
    C 37,74 42,62 48,52
    C 55,42 62,36 69,32
    C 73,33 77,35 81,36 Z
  "/>

  <!-- White eye dot -->
  <circle cx="71" cy="27" r="2.5" fill="#fff"/>
</svg>
